version: 2
updates:
    - package-ecosystem: "npm"
      directory: /
      schedule:
          interval: "weekly"
      groups:
          parcel:
              patterns:
                  - "parcel"
                  - "@parcel/*"
    - package-ecosystem: "github-actions"
      directory: /
      schedule:
          interval: "weekly"
      groups:
          github-actions:
              patterns:
                  - "*"
